name: Mirror LXC RootFS

on:
  schedule:
    - cron: '0 6 * * 0'   # every Sunday 06:00 UTC
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install aiohttp beautifulsoup4

      - name: Download tarballs + generate rootfs.json
        run: python3 download_rootfs.py

      - name: Generate release tag
        id: tag
        run: |
          TAG="v$(date +'%Y%m%d-%H%M%S')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG"

      - name: Create GitHub release and upload tarballs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "LXC RootFS Mirror ${{ steps.tag.outputs.tag }}"
          files: tarballs/*.tar.xz
          body: |
            Automated LXC RootFS mirror.
            Source: https://images.linuxcontainers.org/images/
            Built: ${{ steps.tag.outputs.tag }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch download_url in rootfs.json
        env:
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          RELEASE_TAG:        ${{ steps.tag.outputs.tag }}
        run: python3 update_download_urls.py rootfs.json

      - name: Commit rootfs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rootfs.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update rootfs.json for ${{ steps.tag.outputs.tag }}"
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "rootfs.json unchanged, nothing to commit"
          fi
